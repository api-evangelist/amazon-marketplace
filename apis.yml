apis:
  - aid: amazon-marketplace:aws-marketplace-catalog-api
    name: AWS Marketplace Catalog API
    description: >-
      The AWS Marketplace Catalog API provides programmatic access to manage
      entities and change sets for publishing and updating software products,
      data products, and machine learning products on AWS Marketplace. Covers
      13 operations for entity discovery, change set lifecycle management,
      resource policies, and resource tagging.
    humanURL: https://aws.amazon.com/marketplace/
    baseURL: https://catalog.marketplace.amazonaws.com
