aid: amazon-marketplace
name: Amazon Marketplace
description: >-
  AWS Marketplace is a curated digital catalog that makes it easy to find,
  buy, deploy, and manage third-party software, data, and services that run
  on AWS. It offers thousands of software listings from independent software
  vendors that make it easy to find, test, buy, and deploy software.
